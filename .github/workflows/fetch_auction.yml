name: Fetch Auction Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch auction data
        run: python fetch_auction.py

      - name: Commit auction_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add auction_data.json
          git diff --cached --quiet || git commit -m "Update auction data [$(date -u '+%H:%M UTC')]"
          git push
          
      - name: Deploy auction_data.json to Firebase Hosting
        run: |
          npm install -g firebase-tools
          cat > firebase_deploy.json << 'EOF'
          {"hosting":{"public":".","ignore":["firebase.json",".gitignore","*.py","*.yml","*.md","fantrax_data.json","*.html","sw.js","sync.py"],"headers":[{"source":"/auction_data.json","headers":[{"key":"Cache-Control","value":"no-cache, no-store, must-revalidate"},{"key":"Access-Control-Allow-Origin","value":"*"}]}]}}
          EOF
          FIREBASE_TOKEN="${{ secrets.FIREBASE_TOKEN }}" firebase deploy --only hosting --project grapefruit-league-uaat --config firebase_deploy.json

















