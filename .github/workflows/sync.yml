name: GFL Auction Sync

on:
  schedule:
      - cron: '*/10 * * * *'
        workflow_dispatch:

        jobs:
          sync:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout repo
                                uses: actions/checkout@v4

                                      - name: Set up Python
                                              uses: actions/setup-python@v5
                                                      with:
                                                                python-version: '3.12'

                                                                      - name: Run sync
                                                                              env:
                                                                                        FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
                                                                                                run: python sync.py
