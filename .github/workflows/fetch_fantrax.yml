name: Fetch Fantrax Draft Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Fantrax draft data
        env:
          FANTRAX_USERNAME:  ${{ secrets.FANTRAX_USERNAME }}
          FANTRAX_SECRET_ID: ${{ secrets.FANTRAX_SECRET_ID }}
        run: python fetch_fantrax.py

      - name: Commit fantrax_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fantrax_data.json
          git diff --cached --quiet || git commit -m "Update Fantrax draft data [$(date -u '+%H:%M UTC')]"
          git push










