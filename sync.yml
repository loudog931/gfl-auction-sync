name: GFL Auction Sync

on:
  schedule:
    # Runs every 10 minutes, 24/7
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Also lets you trigger it manually from GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run sync
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: python sync.py
